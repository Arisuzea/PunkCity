name: Linter

on:
  pull_request:
  push:
    branches:
      - dev

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install -g htmlhint stylelint eslint

      - run: htmlhint index.html
      - run: stylelint "css/**/*.css"
      - run: eslint "js/**/*.js"